sonar.projectKey=orlandoburli_feature-bacon-frontend
sonar.organization=orlandoburli

sonar.projectName=Feature Bacon - Frontend
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.exclusions=\
  **/node_modules/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Tests
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage (update path when test runner is configured)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality gate
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8
