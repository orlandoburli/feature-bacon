sonar.projectKey=orlandoburli_feature-bacon
sonar.organization=orlandoburli

sonar.projectName=Feature Bacon
sonar.projectVersion=0.1.0

# Sources
sonar.sources=backend/internal,backend/cmd,backend/modules
sonar.tests=backend/internal
sonar.test.inclusions=**/*_test.go
sonar.exclusions=**/gen/**,**/vendor/**,**/node_modules/**,**/*.pb.go,**/*_grpc.pb.go

# Go coverage
sonar.go.coverage.reportPaths=backend/coverage.out

# Quality gate — coverage thresholds are enforced in CI and
# should match the SonarQube Cloud quality gate configuration:
#   Fail: coverage on new code < 80%
#   Warn: coverage on new code < 90%
# Configure the quality gate in SonarQube Cloud UI:
#   Project Settings → Quality Gate → set "Coverage on New Code" conditions.

# PR decoration (automatic on SonarQube Cloud for GitHub)
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8
