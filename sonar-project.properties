sonar.projectKey=orlandoburli_feature-bacon
sonar.organization=orlandoburli

sonar.projectName=Feature Bacon
sonar.projectVersion=0.1.0

# Only analyze backend source code — not generated, not specs, not docs
sonar.sources=.
sonar.inclusions=backend/internal/**,backend/cmd/**,backend/modules/**,.github/workflows/**

# Tests
sonar.tests=backend/internal
sonar.test.inclusions=**/*_test.go

# Exclusions: generated protobuf, vendor, node_modules, specs, docs
sonar.exclusions=\
  **/gen/**,\
  **/*.pb.go,\
  **/*_grpc.pb.go,\
  **/vendor/**,\
  **/node_modules/**,\
  openspec/**,\
  docs/**,\
  proto/**,\
  certs/**,\
  deploy/**,\
  frontend/**

# Go coverage
sonar.go.coverage.reportPaths=backend/coverage.out

# Quality gate
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8
