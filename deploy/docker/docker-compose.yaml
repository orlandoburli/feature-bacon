services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bacon
      POSTGRES_PASSWORD: bacon
      POSTGRES_DB: bacon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bacon"]
      interval: 2s
      timeout: 5s
      retries: 10

  module-postgres:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.module-postgres
    environment:
      MODULE_POSTGRES_DSN: postgres://bacon:bacon@postgres:5432/bacon?sslmode=disable
      MODULE_GRPC_ADDR: ":50051"
    depends_on:
      postgres:
        condition: service_healthy

  bacon-core:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.core
    ports:
      - "8080:8080"
    environment:
      BACON_PERSISTENCE: grpc
      BACON_PERSISTENCE_ADDR: module-postgres:50051
      BACON_HTTP_ADDR: ":8080"
      BACON_AUTH_ENABLED: "false"
      BACON_LOG_FORMAT: text
    depends_on:
      - module-postgres
