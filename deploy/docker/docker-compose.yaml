services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bacon
      POSTGRES_PASSWORD: bacon
      POSTGRES_DB: bacon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bacon"]
      interval: 2s
      timeout: 5s
      retries: 10

  module-postgres:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.module-postgres
    environment:
      MODULE_POSTGRES_DSN: postgres://bacon:bacon@postgres:5432/bacon?sslmode=disable
      MODULE_GRPC_ADDR: ":50051"
    depends_on:
      postgres:
        condition: service_healthy

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10

  module-kafka:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.module-kafka
    environment:
      MODULE_KAFKA_BROKERS: kafka:9092
      MODULE_KAFKA_TOPIC: bacon-events
      MODULE_GRPC_ADDR: ":50052"
    depends_on:
      kafka:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  module-redis:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.module-redis
    environment:
      MODULE_REDIS_ADDR: "redis:6379"
      MODULE_GRPC_ADDR: ":50051"
    depends_on:
      redis:
        condition: service_healthy

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 2s
      timeout: 5s
      retries: 10

  module-mongodb:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.module-mongodb
    environment:
      MODULE_MONGO_URI: "mongodb://mongodb:27017"
      MODULE_MONGO_DB: "feature_bacon"
      MODULE_GRPC_ADDR: ":50051"
    depends_on:
      mongodb:
        condition: service_healthy

  bacon-core:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.core
    ports:
      - "8080:8080"
    environment:
      BACON_PERSISTENCE: grpc
      BACON_PERSISTENCE_ADDR: module-postgres:50051
      BACON_PUBLISHER_ADDRS: module-kafka:50052
      BACON_HTTP_ADDR: ":8080"
      BACON_AUTH_ENABLED: "false"
      BACON_LOG_FORMAT: text
    depends_on:
      - module-postgres
      - module-kafka
