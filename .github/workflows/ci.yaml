name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COVERAGE_FAIL_THRESHOLD: 80
  COVERAGE_WARN_THRESHOLD: 90

jobs:
  lint-proto:
    name: Lint protobuf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          breaking: true
          breaking_against: "https://github.com/${{ github.repository }}.git#branch=main"

  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: backend

  test:
    name: Test Go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      HAS_SONAR_TOKEN: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Run unit tests
        working-directory: backend
        run: go test -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/... ./...

      - name: Parse coverage
        id: coverage
        working-directory: backend
        run: |
          COVERAGE_REPORT=$(go tool cover -func=coverage.out)
          TOTAL=$(echo "$COVERAGE_REPORT" | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "report<<REPORT_EOF" >> "$GITHUB_OUTPUT"
          echo "$COVERAGE_REPORT" >> "$GITHUB_OUTPUT"
          echo "REPORT_EOF" >> "$GITHUB_OUTPUT"

          # Determine status
          TOTAL_INT=${TOTAL%.*}
          if [ "$TOTAL_INT" -lt "$COVERAGE_FAIL_THRESHOLD" ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "emoji=🔴" >> "$GITHUB_OUTPUT"
          elif [ "$TOTAL_INT" -lt "$COVERAGE_WARN_THRESHOLD" ]; then
            echo "status=warn" >> "$GITHUB_OUTPUT"
            echo "emoji=🟡" >> "$GITHUB_OUTPUT"
          else
            echo "status=pass" >> "$GITHUB_OUTPUT"
            echo "emoji=🟢" >> "$GITHUB_OUTPUT"
          fi

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-backend
          message: |
            ## ${{ steps.coverage.outputs.emoji }} Backend Coverage: ${{ steps.coverage.outputs.total }}%

            | Threshold | Required | Result |
            |-----------|----------|--------|
            | Minimum (fail) | ≥ ${{ env.COVERAGE_FAIL_THRESHOLD }}% | ${{ steps.coverage.outputs.status != 'fail' && '✅ Pass' || '❌ Fail' }} |
            | Recommended (warn) | ≥ ${{ env.COVERAGE_WARN_THRESHOLD }}% | ${{ steps.coverage.outputs.status == 'pass' && '✅ Pass' || '⚠️ Below target' }} |

            <details>
            <summary>Coverage by function</summary>

            ```
            ${{ steps.coverage.outputs.report }}
            ```

            </details>

      - name: Enforce coverage threshold
        if: steps.coverage.outputs.status == 'fail'
        run: |
          echo "::error::Backend coverage ${{ steps.coverage.outputs.total }}% is below the minimum threshold of ${{ env.COVERAGE_FAIL_THRESHOLD }}%"
          exit 1

      - name: Warn on low coverage
        if: steps.coverage.outputs.status == 'warn'
        run: |
          echo "::warning::Backend coverage ${{ steps.coverage.outputs.total }}% is below the recommended threshold of ${{ env.COVERAGE_WARN_THRESHOLD }}%"

      - name: SonarQube Scan
        if: env.HAS_SONAR_TOKEN == 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-go, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Build all binaries
        working-directory: backend
        run: |
          for cmd in cmd/*/; do
            name=$(basename "$cmd")
            echo "Building $name..."
            go build -o "bin/$name" "./$cmd"
          done
