name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Docker images → GitHub Container Registry
  # ---------------------------------------------------------------------------
  docker:
    name: Docker / ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bacon-core
            dockerfile: deploy/docker/Dockerfile.core
          - image: module-postgres
            dockerfile: deploy/docker/Dockerfile.module-postgres
          - image: module-redis
            dockerfile: deploy/docker/Dockerfile.module-redis
          - image: module-mongodb
            dockerfile: deploy/docker/Dockerfile.module-mongodb
          - image: module-kafka
            dockerfile: deploy/docker/Dockerfile.module-kafka
          - image: module-sqs
            dockerfile: deploy/docker/Dockerfile.module-sqs
          - image: module-gcppubsub
            dockerfile: deploy/docker/Dockerfile.module-gcppubsub
          - image: module-grpcpub
            dockerfile: deploy/docker/Dockerfile.module-grpcpub
          - image: frontend
            dockerfile: deploy/docker/Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Go SDK — create a sub-directory tag so `go get` resolves the module
  # ---------------------------------------------------------------------------
  tag-go-sdk:
    name: Tag Go SDK
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Go module tag
        run: |
          TAG="sdks/go/v${{ needs.prepare.outputs.version }}"
          echo "Creating tag $TAG"
          git tag "$TAG"
          git push origin "$TAG"

  # ---------------------------------------------------------------------------
  # JavaScript / TypeScript SDK → npm (via OIDC trusted publisher)
  #
  # Requires trusted publishing configured on npmjs.com for this repo.
  # ---------------------------------------------------------------------------
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build and publish
        working-directory: sdks/javascript
        run: |
          npm ci
          npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version
          npm run build
          npm publish --provenance --access public

  # ---------------------------------------------------------------------------
  # Python SDK → PyPI (via OIDC trusted publisher — no secret needed)
  #
  # Requires a PyPI trusted publisher configured for this repo / workflow.
  # See https://docs.pypi.org/trusted-publishers/creating-a-project-through-oidc/
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/feature-bacon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version and build
        working-directory: sdks/python
        run: |
          pip install build
          sed -i "s/^version = .*/version = \"${{ needs.prepare.outputs.version }}\"/" pyproject.toml
          python -m build

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/

  # ---------------------------------------------------------------------------
  # Java SDK → Maven Central
  #
  # Required secrets:
  #   MAVEN_CENTRAL_USERNAME — token username from central.sonatype.com
  #   MAVEN_CENTRAL_TOKEN    — token password from central.sonatype.com
  #   MAVEN_GPG_PRIVATE_KEY  — ASCII-armored GPG private key
  #   MAVEN_GPG_PASSPHRASE   — passphrase for the GPG key
  # ---------------------------------------------------------------------------
  publish-maven:
    name: Publish Maven Central
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish
        working-directory: sdks/java
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn versions:set -DnewVersion="${{ needs.prepare.outputs.version }}" -DgenerateBackupPoms=false
          mvn deploy -P release -DskipTests

  # ---------------------------------------------------------------------------
  # GitHub Release with auto-generated notes
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cat <<EOF > /tmp/release-body.md
          ## Docker Images

          All images are published to \`ghcr.io/${{ github.repository }}/\`:

          | Image | Pull command |
          |-------|-------------|
          | bacon-core | \`docker pull ghcr.io/${{ github.repository }}/bacon-core:${VERSION}\` |
          | module-postgres | \`docker pull ghcr.io/${{ github.repository }}/module-postgres:${VERSION}\` |
          | module-redis | \`docker pull ghcr.io/${{ github.repository }}/module-redis:${VERSION}\` |
          | module-mongodb | \`docker pull ghcr.io/${{ github.repository }}/module-mongodb:${VERSION}\` |
          | module-kafka | \`docker pull ghcr.io/${{ github.repository }}/module-kafka:${VERSION}\` |
          | module-sqs | \`docker pull ghcr.io/${{ github.repository }}/module-sqs:${VERSION}\` |
          | module-gcppubsub | \`docker pull ghcr.io/${{ github.repository }}/module-gcppubsub:${VERSION}\` |
          | module-grpcpub | \`docker pull ghcr.io/${{ github.repository }}/module-grpcpub:${VERSION}\` |
          | frontend | \`docker pull ghcr.io/${{ github.repository }}/frontend:${VERSION}\` |

          ## SDKs

          | Language | Package | Version |
          |----------|---------|---------|
          | Go | \`go get github.com/${{ github.repository }}/sdks/go@v${VERSION}\` | v${VERSION} |
          | JavaScript | \`npm install feature-bacon@${VERSION}\` | ${VERSION} |
          | Python | \`pip install feature-bacon==${VERSION}\` | ${VERSION} |
          | Java | \`io.github.orlandoburli:feature-bacon-sdk:${VERSION}\` | ${VERSION} |
          EOF

          gh release create "$GITHUB_REF_NAME" \
            --title "Release v${VERSION}" \
            --notes-file /tmp/release-body.md \
            --generate-notes
