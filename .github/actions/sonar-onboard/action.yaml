name: Ensure SonarCloud Project
description: >
  Creates the SonarCloud project if it doesn't exist, disables automatic
  analysis, and ensures the main branch name matches the repository default.

inputs:
  sonar-token:
    description: SonarCloud API token
    required: true
  project-key:
    description: SonarCloud project key
    required: true
  project-name:
    description: SonarCloud project display name
    required: true
  organization:
    description: SonarCloud organization
    required: false
    default: orlandoburli
  default-branch:
    description: Expected main branch name
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: Ensure SonarCloud project exists
      shell: bash
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        SONAR_PROJECT_KEY: ${{ inputs.project-key }}
        SONAR_ORG: ${{ inputs.organization }}
        SONAR_PROJECT_NAME: ${{ inputs.project-name }}
      run: |
        API="https://sonarcloud.io/api"

        TOTAL=$(curl -sf -u "$SONAR_TOKEN:" \
          "$API/projects/search?organization=$SONAR_ORG&projects=$SONAR_PROJECT_KEY" \
          | jq '.paging.total')

        if [ "$TOTAL" = "0" ]; then
          echo "::notice::Creating SonarCloud project $SONAR_PROJECT_KEY"
          curl -sf -X POST -u "$SONAR_TOKEN:" "$API/projects/create" \
            -d "name=$SONAR_PROJECT_NAME" \
            -d "project=$SONAR_PROJECT_KEY" \
            -d "organization=$SONAR_ORG" \
            -d "visibility=public"

          if curl -s -o /dev/null -w "%{http_code}" -X POST -u "$SONAR_TOKEN:" "$API/settings/set" \
            -d "key=sonar.autoscan.enabled" \
            -d "value=false" \
            -d "component=$SONAR_PROJECT_KEY" | grep -q "^2"; then
            echo "::notice::Automatic analysis disabled via API"
          else
            echo "::warning::Could not disable automatic analysis via API â€” disable it manually in SonarCloud project settings"
          fi

          echo "::notice::SonarCloud project created"
        fi

        curl -s -o /dev/null -w "" -X POST -u "$SONAR_TOKEN:" "$API/settings/set" \
          -d "key=sonar.leak.period" \
          -d "value=previous_version" \
          -d "component=$SONAR_PROJECT_KEY" || true

        curl -s -o /dev/null -w "" -X POST -u "$SONAR_TOKEN:" "$API/settings/set" \
          -d "key=sonar.leak.period.type" \
          -d "value=previous_version" \
          -d "component=$SONAR_PROJECT_KEY" || true

    - name: Ensure SonarCloud main branch
      shell: bash
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        SONAR_PROJECT_KEY: ${{ inputs.project-key }}
        DEFAULT_BRANCH: ${{ inputs.default-branch }}
      run: |
        API="https://sonarcloud.io/api"

        BRANCHES=$(curl -sf -u "$SONAR_TOKEN:" \
          "$API/project_branches/list?project=$SONAR_PROJECT_KEY") || exit 0

        SONAR_MAIN=$(echo "$BRANCHES" | jq -r '.branches[] | select(.isMain==true) | .name')

        if [ "$SONAR_MAIN" = "$DEFAULT_BRANCH" ]; then
          echo "SonarCloud main branch is already '$DEFAULT_BRANCH'."
          exit 0
        fi

        echo "::notice::SonarCloud main branch is '$SONAR_MAIN', expected '$DEFAULT_BRANCH'"

        CONFLICT=$(echo "$BRANCHES" | jq -r --arg b "$DEFAULT_BRANCH" \
          '.branches[] | select(.isMain==false and .name==$b) | .name')

        if [ -n "$CONFLICT" ]; then
          echo "Deleting conflicting branch '$CONFLICT'..."
          curl -sf -X POST -u "$SONAR_TOKEN:" "$API/project_branches/delete" \
            -d "project=$SONAR_PROJECT_KEY" \
            -d "branch=$CONFLICT"
        fi

        echo "Renaming '$SONAR_MAIN' to '$DEFAULT_BRANCH'..."
        curl -sf -X POST -u "$SONAR_TOKEN:" "$API/project_branches/rename" \
          -d "project=$SONAR_PROJECT_KEY" \
          -d "name=$DEFAULT_BRANCH"

        echo "::notice::SonarCloud main branch renamed to '$DEFAULT_BRANCH'"
