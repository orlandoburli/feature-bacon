services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  module-redis:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.module-redis
    environment:
      MODULE_REDIS_ADDR: "redis:6379"
      MODULE_GRPC_ADDR: ":50051"
    depends_on:
      redis:
        condition: service_healthy

  bacon:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.core
    ports:
      - "8080:8080"
    volumes:
      - ./flags.yaml:/etc/bacon/flags.yaml:ro
    environment:
      BACON_MODE: sidecar
      BACON_PERSISTENCE: grpc
      BACON_PERSISTENCE_ADDR: module-redis:50051
      BACON_CONFIG_FILE: /etc/bacon/flags.yaml
      BACON_HTTP_ADDR: ":8080"
      BACON_AUTH_ENABLED: "false"
      BACON_LOG_FORMAT: text
    depends_on:
      - module-redis
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 3s
      timeout: 5s
      retries: 10
