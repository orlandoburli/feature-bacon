services:
  bacon:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.core
    ports:
      - "8080:8080"
    volumes:
      - ./flags.yaml:/etc/bacon/flags.yaml:ro
    environment:
      BACON_MODE: sidecar
      BACON_PERSISTENCE: file
      BACON_CONFIG_FILE: /etc/bacon/flags.yaml
      BACON_HTTP_ADDR: ":8080"
      BACON_AUTH_ENABLED: "false"
      BACON_LOG_FORMAT: text
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 3s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ../../deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      bacon:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/system-health.json
    volumes:
      - ../../deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  load-generator:
    image: curlimages/curl:8.8.0
    entrypoint: ["/bin/sh", "/scripts/load-generator.sh"]
    volumes:
      - ./load-generator.sh:/scripts/load-generator.sh:ro
    environment:
      BACON_URL: http://bacon:8080
      INTERVAL: "0.3"
    depends_on:
      bacon:
        condition: service_healthy

volumes:
  prometheus_data:
  grafana_data:
