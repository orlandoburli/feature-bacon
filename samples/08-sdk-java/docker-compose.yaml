services:
  bacon:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.core
    volumes:
      - ./flags.yaml:/etc/bacon/flags.yaml:ro
    environment:
      BACON_MODE: sidecar
      BACON_PERSISTENCE: file
      BACON_CONFIG_FILE: /etc/bacon/flags.yaml
      BACON_HTTP_ADDR: ":8080"
      BACON_AUTH_ENABLED: "false"
      BACON_LOG_FORMAT: text
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 3s
      timeout: 5s
      retries: 5

  product-service:
    build:
      context: ../../
      dockerfile: samples/08-sdk-java/Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACON_URL: http://bacon:8080
      PORT: "3000"
      ENVIRONMENT: production
    depends_on:
      bacon:
        condition: service_healthy
